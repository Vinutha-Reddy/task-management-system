<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-red-50 min-h-screen flex items-center justify-center">
    <div class="text-center bg-white p-10 rounded-lg shadow-md max-w-lg">
        <h1 class="text-4xl font-bold text-red-600 mb-4">Oops! Something went wrong.</h1>
        <p class="text-gray-700 mb-6">We're sorry, but the page you requested could not be found or an error occurred.</p>
        <a th:href="@{/dashboard}" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
            Go Back to Dashboard
        </a>
    </div>
</body>
</html>
